<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Workouts">
<meta name="theme-color" content="#ffffff">
<title>Daily Tracker</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
:root {
  --bg: #ffffff; --bg2: #f5f5f4; --bg3: #eeede9;
  --text: #1c1c1a; --text2: #6b6b67; --text3: #a5a5a0;
  --border: rgba(0,0,0,0.10); --border2: rgba(0,0,0,0.18);
  --teal: #1D9E75; --teal-light: #E1F5EE; --teal-dark: #085041;
  --blue-light: #E6F1FB; --blue-dark: #185FA5;
  --amber-light: #FAEEDA; --amber-dark: #854F0B;
  --purple-light: #EEEDFE; --purple-dark: #534AB7;
  --orange-light: #FAECE7; --orange-dark: #993C1D;
  --radius: 14px; --radius-sm: 8px;
}
@media (prefers-color-scheme: dark) {
  :root {
    --bg: #1a1a18; --bg2: #242422; --bg3: #2e2e2b;
    --text: #f0efeb; --text2: #9e9e99; --text3: #6b6b67;
    --border: rgba(255,255,255,0.09); --border2: rgba(255,255,255,0.16);
    --teal: #2BC490; --teal-light: #04342C; --teal-dark: #9FE1CB;
    --blue-light: #042C53; --blue-dark: #85B7EB;
    --amber-light: #412402; --amber-dark: #FAC775;
    --purple-light: #26215C; --purple-dark: #AFA9EC;
    --orange-light: #4A1B0C; --orange-dark: #F0997B;
  }
}
html, body {
  background: var(--bg); color: var(--text);
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
  font-size: 16px; line-height: 1.5; min-height: 100vh;
  -webkit-font-smoothing: antialiased;
}
.app { max-width: 480px; margin: 0 auto; padding: 0 0 6rem; }

/* SVG icons inline via CSS mask — no external dependency */
.icon { display:inline-flex; align-items:center; justify-content:center; width:1em; height:1em; }
.icon svg { width:100%; height:100%; stroke:currentColor; fill:none; stroke-width:2; stroke-linecap:round; stroke-linejoin:round; }

.header {
  position: sticky; top: 0; z-index: 10;
  background: var(--bg); border-bottom: 0.5px solid var(--border);
  padding: 14px 20px 12px;
  display: flex; align-items: center; gap: 10px;
}
.header-title { flex: 1; text-align: center; }
.header-title .day-name { font-size: 15px; font-weight: 600; color: var(--text); line-height: 1.2; }
.header-title .day-date { font-size: 12px; color: var(--text3); margin-top: 1px; }
.nav-btn {
  background: none; border: 0.5px solid var(--border2);
  border-radius: var(--radius-sm); width: 34px; height: 34px;
  display: flex; align-items: center; justify-content: center;
  cursor: pointer; color: var(--text2); font-size: 17px; flex-shrink: 0;
  transition: background 0.1s;
}
.nav-btn:hover, .nav-btn:active { background: var(--bg2); }
.today-btn {
  font-size: 12px; font-weight: 500; color: var(--teal);
  background: none; border: 0.5px solid var(--teal);
  border-radius: var(--radius-sm); padding: 6px 10px;
  cursor: pointer; white-space: nowrap; transition: background 0.1s;
}
.today-btn:hover { background: var(--teal-light); }

.progress-wrap { padding: 14px 20px 10px; border-bottom: 0.5px solid var(--border); }
.progress-meta { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 8px; }
.progress-meta span { font-size: 13px; color: var(--text2); }
.progress-meta strong { font-size: 13px; font-weight: 600; color: var(--text); }
.progress-track { height: 5px; background: var(--bg3); border-radius: 99px; overflow: hidden; }
.progress-fill { height: 100%; background: var(--teal); border-radius: 99px; transition: width 0.35s cubic-bezier(.4,0,.2,1); }

.section-wrap { padding: 0 20px; }
.section-head {
  font-size: 11px; font-weight: 600; letter-spacing: 0.07em;
  text-transform: uppercase; color: var(--text3); padding: 18px 0 8px;
}

.ex-card {
  background: var(--bg); border: 0.5px solid var(--border);
  border-radius: var(--radius); margin-bottom: 8px; overflow: hidden;
}
.ex-card.all-done-card { background: var(--bg2); }
.ex-card.pushed { border-color: var(--orange-dark); }

.ex-header {
  display: flex; align-items: center; gap: 12px;
  padding: 13px 14px; cursor: pointer;
  user-select: none; -webkit-user-select: none; touch-action: manipulation;
}
.ex-header:active { background: var(--bg2); }

.check {
  width: 28px; height: 28px; min-width: 28px; border-radius: 50%;
  border: 1.5px solid var(--border2);
  display: flex; align-items: center; justify-content: center;
  font-size: 14px; transition: all 0.18s; background: var(--bg); pointer-events: none;
}
.all-done-card .check { background: var(--teal); border-color: var(--teal); }

.ex-body { flex: 1; min-width: 0; }
.ex-name { font-size: 15px; font-weight: 500; color: var(--text); }
.all-done-card .ex-name { color: var(--text3); text-decoration: line-through; text-decoration-color: var(--text3); }
.ex-detail { font-size: 13px; color: var(--text2); margin-top: 2px; }

.ex-right { display: flex; align-items: center; gap: 6px; flex-shrink: 0; }
.ex-tag { font-size: 11px; font-weight: 600; padding: 3px 9px; border-radius: 99px; white-space: nowrap; }
.tag-strength { background: var(--blue-light); color: var(--blue-dark); }
.tag-cardio   { background: var(--amber-light); color: var(--amber-dark); }
.tag-rehab    { background: var(--teal-light); color: var(--teal-dark); }
.tag-mobility { background: var(--purple-light); color: var(--purple-dark); }
.pushed-badge { font-size: 11px; font-weight: 600; padding: 3px 8px; border-radius: 99px; background: var(--orange-light); color: var(--orange-dark); }

.chevron { transition: transform 0.2s; display:inline-flex; color: var(--text3); }
.ex-card.open .chevron { transform: rotate(180deg); }

.sets-panel { display: none; padding: 0 14px 12px; border-top: 0.5px solid var(--border); }
.ex-card.open .sets-panel { display: block; }

.sets-header {
  display: grid; grid-template-columns: 22px 1fr 90px 30px;
  gap: 8px; padding: 8px 0 6px;
  font-size: 11px; font-weight: 600; letter-spacing: 0.05em;
  text-transform: uppercase; color: var(--text3);
}
.sets-header span:nth-child(3) { text-align: center; }

.set-row {
  display: grid; grid-template-columns: 22px 1fr 90px 30px;
  gap: 8px; align-items: center; padding: 6px 0;
  border-top: 0.5px solid var(--border);
}
.set-num { font-size: 13px; color: var(--text3); font-weight: 500; }
.set-detail { font-size: 13px; color: var(--text2); }

.weight-wrap { display: flex; align-items: center; gap: 3px; justify-content: center; }
.weight-input {
  width: 52px; text-align: center; font-size: 13px; font-weight: 500;
  color: var(--text); background: var(--bg2);
  border: 0.5px solid var(--border2); border-radius: 6px;
  padding: 4px; outline: none; font-family: inherit;
  -webkit-appearance: none;
}
.weight-input:focus { border-color: var(--teal); }
.weight-unit { font-size: 11px; color: var(--text3); }

.set-check {
  width: 26px; height: 26px; border-radius: 6px;
  border: 1.5px solid var(--border2);
  display: flex; align-items: center; justify-content: center;
  cursor: pointer; transition: all 0.15s; background: var(--bg); flex-shrink: 0;
  touch-action: manipulation;
}
.set-check.done { background: var(--teal); border-color: var(--teal); }

.push-btn {
  margin-top: 10px; width: 100%;
  background: none; border: 0.5px dashed var(--border2);
  border-radius: var(--radius-sm); padding: 7px 12px;
  font-size: 12px; font-weight: 500; color: var(--text2);
  cursor: pointer; display: flex; align-items: center;
  justify-content: center; gap: 5px; transition: background 0.1s;
  font-family: inherit;
}
.push-btn:hover { background: var(--bg2); }
.push-btn.pushed-state { color: var(--orange-dark); border-color: var(--orange-dark); }

.all-done { text-align: center; padding: 3rem 1.5rem 1rem; }
.all-done .big-icon { font-size: 40px; margin-bottom: 10px; }
.all-done h3 { font-size: 17px; font-weight: 600; margin-bottom: 6px; color: var(--text); }
.all-done p { font-size: 14px; color: var(--text2); }

.rest-day { text-align: center; padding: 3rem 2rem 1rem; }
.rest-day .big-icon { font-size: 36px; margin-bottom: 10px; }
.rest-day h3 { font-size: 16px; font-weight: 600; color: var(--text); margin-bottom: 6px; }
.rest-day p { font-size: 13px; color: var(--text2); }

.bottom-bar {
  position: fixed; bottom: 0; left: 0; right: 0;
  background: var(--bg); border-top: 0.5px solid var(--border);
  padding: 10px 20px; max-width: 480px; margin: 0 auto;
  display: flex; gap: 8px;
}
.reset-btn, .push-all-btn {
  flex: 1; background: none; border: 0.5px solid var(--border2);
  border-radius: var(--radius-sm); padding: 10px 6px;
  font-size: 13px; font-weight: 500; color: var(--text2);
  cursor: pointer; display: flex; align-items: center;
  justify-content: center; gap: 6px; transition: background 0.12s;
  font-family: inherit;
}
.reset-btn:hover, .push-all-btn:hover { background: var(--bg2); }
.push-all-btn { color: var(--orange-dark); border-color: var(--orange-dark); }
.push-all-btn:hover { background: var(--orange-light); }
</style>
</head>
<body>
<div class="app">
  <div class="header">
    <button class="nav-btn" id="prev" aria-label="Previous day">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"></polyline></svg>
    </button>
    <div class="header-title">
      <div class="day-name" id="day-name"></div>
      <div class="day-date" id="day-date"></div>
    </div>
    <button class="nav-btn" id="next" aria-label="Next day">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"></polyline></svg>
    </button>
    <button class="today-btn" id="today-btn">TodayTEST</button>
  </div>

  <div class="progress-wrap">
    <div class="progress-meta">
      <span id="prog-label">0 of 0 complete</span>
      <strong id="prog-pct">0%</strong>
    </div>
    <div class="progress-track"><div class="progress-fill" id="prog-bar" style="width:0%"></div></div>
  </div>

  <div class="section-wrap" id="content"></div>
</div>

<div class="bottom-bar">
  <button class="reset-btn" id="reset-btn">
    <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><polyline points="1 4 1 10 7 10"></polyline><path d="M3.51 15a9 9 0 1 0 .49-4"></path></svg>
    Reset day
  </button>
  <button class="push-all-btn" id="push-all-btn">
    <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><line x1="5" y1="12" x2="19" y2="12"></line><polyline points="12 5 19 12 12 19"></polyline></svg>
    Push all to tomorrow
  </button>
</div>

<script>
const MONTHS = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
const DAYS_LONG = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];

const SVG_CHECK = `<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"></polyline></svg>`;
const SVG_CHEVRON_DOWN = `<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"></polyline></svg>`;
const SVG_ARROW = `<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><line x1="5" y1="12" x2="19" y2="12"></line><polyline points="12 5 19 12 12 19"></polyline></svg>`;

function parseSets(detail) {
  const m = detail.match(/^(\d+)\s+set/i);
  return m ? parseInt(m[1]) : 1;
}

const SCHEDULE = {
  0: { rest: true, note: 'Take it easy today. Light movement like a short walk is fine.' },
  1: { sections: {
    'Workout — Upper body': [
      { name: 'Push-ups', detail: '3 sets × 15 reps', tag: 'strength' },
      { name: 'Dumbbell rows', detail: '3 sets × 12 reps each side', tag: 'strength' },
      { name: 'Shoulder press', detail: '3 sets × 10 reps', tag: 'strength' },
    ],
    'Rehab': [
      { name: 'Rotator cuff external rotation', detail: '3 sets × 15 reps, light band', tag: 'rehab' },
      { name: 'Scapular wall slides', detail: '2 sets × 12 reps', tag: 'rehab' },
    ]
  }},
  2: { sections: {
    'Cardio': [
      { name: 'Treadmill or walk', detail: '30 min, moderate pace', tag: 'cardio' },
    ],
    'Rehab': [
      { name: 'Hip flexor stretch', detail: '3 sets × 45 sec each side', tag: 'rehab' },
      { name: 'Clamshells', detail: '3 sets × 20 reps each', tag: 'rehab' },
      { name: 'Dead bug', detail: '3 sets × 10 reps', tag: 'rehab' },
    ]
  }},
  3: { sections: {
    'Workout — Lower body': [
      { name: 'Goblet squats', detail: '4 sets × 12 reps', tag: 'strength' },
      { name: 'Romanian deadlift', detail: '3 sets × 10 reps', tag: 'strength' },
      { name: 'Step-ups', detail: '3 sets × 12 reps each', tag: 'strength' },
    ],
    'Rehab': [
      { name: 'Terminal knee extensions', detail: '3 sets × 15 reps, band', tag: 'rehab' },
      { name: 'Single-leg calf raises', detail: '3 sets × 15 reps each', tag: 'rehab' },
    ]
  }},
  4: { sections: {
    'Cardio': [
      { name: 'Cycling or elliptical', detail: '25 min, low impact', tag: 'cardio' },
    ],
    'Mobility': [
      { name: 'Hip 90/90 stretch', detail: '2 sets × 60 sec each side', tag: 'mobility' },
      { name: 'Thoracic spine rotation', detail: '2 sets × 10 reps each', tag: 'mobility' },
    ]
  }},
  5: { sections: {
    'Workout — Full body': [
      { name: 'Kettlebell swings', detail: '4 sets × 15 reps', tag: 'strength' },
      { name: 'Dumbbell lunges', detail: '3 sets × 10 reps each', tag: 'strength' },
      { name: 'Bent-over rows', detail: '3 sets × 12 reps', tag: 'strength' },
    ],
    'Rehab': [
      { name: 'Glute bridges', detail: '3 sets × 20 reps', tag: 'rehab' },
      { name: 'Banded lateral walks', detail: '3 sets × 15 steps each way', tag: 'rehab' },
    ]
  }},
  6: { sections: {
    'Active Recovery': [
      { name: 'Light walk or swim', detail: '20–40 min, easy pace', tag: 'cardio' },
    ],
    'Mobility': [
      { name: 'Yoga flow or full-body stretch', detail: '15 min', tag: 'mobility' },
      { name: 'Foam roll — legs', detail: '5 min', tag: 'mobility' },
    ]
  }}
};

const STORAGE_KEY = 'workout_tracker_v2';
let offset = 0;
let store = {};
let openCards = new Set();

function loadStore() {
  try { store = JSON.parse(localStorage.getItem(STORAGE_KEY)) || {}; } catch { store = {}; }
}
function saveStore() {
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(store)); } catch {}
}

function dateKey(off) {
  const d = new Date(); d.setDate(d.getDate() + off);
  return d.toISOString().slice(0, 10);
}
function dow(off) {
  const d = new Date(); d.setDate(d.getDate() + off); return d.getDay();
}
function formatDate(off) {
  const d = new Date(); d.setDate(d.getDate() + off);
  return `${MONTHS[d.getMonth()]} ${d.getDate()}, ${d.getFullYear()}`;
}
function labelFor(off) {
  if (off === 0) return 'Today';
  if (off === 1) return 'Tomorrow';
  if (off === -1) return 'Yesterday';
  return DAYS_LONG[dow(off)];
}

function makeItem(ex) {
  const numSets = parseSets(ex.detail);
  return {
    name: ex.name, detail: ex.detail, tag: ex.tag,
    section: ex.section || '', pushed: false,
    sets: Array.from({ length: numSets }, () => ({ done: false, weight: '' }))
  };
}

function getItems(key, day) {
  if (store[key]) return store[key];
  if (day.rest) { store[key] = []; return []; }
  const items = [];
  for (const [sec, exs] of Object.entries(day.sections)) {
    exs.forEach(ex => items.push(makeItem({ ...ex, section: sec })));
  }
  store[key] = items;
  saveStore();
  return items;
}

function isExDone(item) {
  return item.sets.length > 0 && item.sets.every(s => s.done);
}

function toggleSet(key, exIdx, setIdx) {
  store[key][exIdx].sets[setIdx].done = !store[key][exIdx].sets[setIdx].done;
  saveStore(); render();
}

function setWeight(key, exIdx, setIdx, val) {
  store[key][exIdx].sets[setIdx].weight = val;
  saveStore();
}

function resetDay() {
  const key = dateKey(offset);
  if (store[key]) {
    store[key].forEach(e => { e.pushed = false; e.sets.forEach(s => s.done = false); });
    saveStore(); render();
  }
}

function pushExercise(key, exIdx) {
  const item = store[key][exIdx];
  item.pushed = !item.pushed;
  const tmrKey = dateKey(offset + 1);
  const tmrDay = SCHEDULE[dow(offset + 1)];
  if (!store[tmrKey]) getItems(tmrKey, tmrDay);
  if (item.pushed) {
    const already = store[tmrKey].some(e => e.name === item.name && e._pushedFrom === key);
    if (!already) {
      const clone = JSON.parse(JSON.stringify(item));
      clone.pushed = false; clone._pushedFrom = key;
      clone.sets.forEach(s => s.done = false);
      store[tmrKey].push(clone);
    }
  } else {
    store[tmrKey] = store[tmrKey].filter(e => !(e.name === item.name && e._pushedFrom === key));
  }
  saveStore(); render();
}

function pushAll(key) {
  const items = store[key] || [];
  const tmrKey = dateKey(offset + 1);
  const tmrDay = SCHEDULE[dow(offset + 1)];
  if (!store[tmrKey]) getItems(tmrKey, tmrDay);
  items.forEach(item => {
    if (!item.pushed) {
      item.pushed = true;
      const already = store[tmrKey].some(e => e.name === item.name && e._pushedFrom === key);
      if (!already) {
        const clone = JSON.parse(JSON.stringify(item));
        clone.pushed = false; clone._pushedFrom = key;
        clone.sets.forEach(s => s.done = false);
        store[tmrKey].push(clone);
      }
    }
  });
  saveStore(); render();
}

function render() {
  const day = SCHEDULE[dow(offset)];
  const key = dateKey(offset);

  document.getElementById('day-name').textContent = labelFor(offset);
  document.getElementById('day-date').textContent = formatDate(offset);
  document.getElementById('today-btn').style.display = offset === 0 ? 'none' : '';

  const content = document.getElementById('content');

  if (day.rest) {
    document.getElementById('prog-label').textContent = 'Rest day';
    document.getElementById('prog-pct').textContent = '—';
    document.getElementById('prog-bar').style.width = '0%';
    content.innerHTML = `<div class="rest-day">
      <div class="big-icon">🌙</div>
      <h3>Rest &amp; Recovery</h3>
      <p>${day.note}</p>
    </div>`;
    return;
  }

  const items = getItems(key, day);
  const total = items.reduce((s, e) => s + e.sets.length, 0);
  const done  = items.reduce((s, e) => s + e.sets.filter(x => x.done).length, 0);
  const pct   = total ? Math.round((done / total) * 100) : 0;

  document.getElementById('prog-label').textContent = `${done} of ${total} sets complete`;
  document.getElementById('prog-pct').textContent = pct + '%';
  document.getElementById('prog-bar').style.width = pct + '%';

  const sections = {};
  items.forEach((item, i) => {
    const sec = item.section || 'Exercises';
    if (!sections[sec]) sections[sec] = [];
    sections[sec].push({ ...item, idx: i });
  });

  let html = '';
  for (const [sec, exs] of Object.entries(sections)) {
    html += `<div class="section-head">${sec}</div>`;
    for (const ex of exs) {
      const allDone = isExDone(ex);
      const isOpen  = openCards.has(ex.idx);
      const hasSets = ex.sets.length > 1;
      const doneCount = ex.sets.filter(s => s.done).length;
      const setProgress = hasSets
        ? `<span style="font-size:12px;color:var(--text3);margin-left:4px;font-weight:400">${doneCount}/${ex.sets.length}</span>`
        : '';

      let setsHtml = '';
      if (hasSets) {
        setsHtml += `<div class="sets-header"><span>#</span><span>Reps</span><span>Weight</span><span></span></div>`;
        ex.sets.forEach((s, si) => {
          const reps = ex.detail.replace(/^\d+\s+sets?\s*[×x]\s*/i,'').replace(/^\d+\s*[×x]\s*/i,'');
          setsHtml += `<div class="set-row">
            <span class="set-num">${si+1}</span>
            <span class="set-detail">${reps}</span>
            <div class="weight-wrap">
              <input class="weight-input" type="number" inputmode="decimal" min="0" step="2.5"
                placeholder="—" value="${s.weight||''}"
                data-ex="${ex.idx}" data-set="${si}" aria-label="Weight set ${si+1}">
              <span class="weight-unit">lb</span>
            </div>
            <div class="set-check${s.done?' done':''}" data-ex="${ex.idx}" data-set="${si}" tabindex="0">
              ${s.done ? SVG_CHECK : ''}
            </div>
          </div>`;
        });
      } else {
        const s = ex.sets[0];
        setsHtml += `<div class="set-row" style="grid-template-columns:1fr 90px 30px">
          <span class="set-detail">${ex.detail}</span>
          <div class="weight-wrap">
            <input class="weight-input" type="number" inputmode="decimal" min="0" step="2.5"
              placeholder="—" value="${s.weight||''}"
              data-ex="${ex.idx}" data-set="0" aria-label="Weight">
            <span class="weight-unit">lb</span>
          </div>
          <div class="set-check${s.done?' done':''}" data-ex="${ex.idx}" data-set="0" tabindex="0">
            ${s.done ? SVG_CHECK : ''}
          </div>
        </div>`;
      }

      html += `<div class="ex-card${allDone?' all-done-card':''}${ex.pushed?' pushed':''}${isOpen?' open':''}" data-idx="${ex.idx}">
        <div class="ex-header" data-toggle="${ex.idx}">
          <div class="check">${allDone ? SVG_CHECK : ''}</div>
          <div class="ex-body">
            <div class="ex-name">${ex.name}${setProgress}</div>
            <div class="ex-detail">${ex.detail}</div>
          </div>
          <div class="ex-right">
            ${ex.pushed
              ? '<span class="pushed-badge">pushed</span>'
              : `<span class="ex-tag tag-${ex.tag}">${ex.tag}</span>`}
            <span class="chevron">${SVG_CHEVRON_DOWN}</span>
          </div>
        </div>
        <div class="sets-panel">
          ${setsHtml}
          <button class="push-btn${ex.pushed?' pushed-state':''}" data-push="${ex.idx}">
            ${SVG_ARROW}
            ${ex.pushed ? 'Remove from tomorrow' : 'Push to tomorrow'}
          </button>
        </div>
      </div>`;
    }
  }

  content.innerHTML = html;

  content.querySelectorAll('[data-toggle]').forEach(el => {
    el.addEventListener('click', () => {
      const idx = +el.dataset.toggle;
      if (openCards.has(idx)) openCards.delete(idx); else openCards.add(idx);
      render();
    });
  });

  content.querySelectorAll('.set-check').forEach(el => {
    const fn = e => { e.stopPropagation(); toggleSet(key, +el.dataset.ex, +el.dataset.set); };
    el.addEventListener('click', fn);
    el.addEventListener('keydown', e => { if (e.key===' '||e.key==='Enter'){e.preventDefault();fn(e);} });
  });

  content.querySelectorAll('.weight-input').forEach(el => {
    el.addEventListener('click', e => e.stopPropagation());
    el.addEventListener('change', e => { e.stopPropagation(); setWeight(key, +el.dataset.ex, +el.dataset.set, el.value); });
  });

  content.querySelectorAll('[data-push]').forEach(btn => {
    btn.addEventListener('click', e => { e.stopPropagation(); pushExercise(key, +btn.dataset.push); });
  });
}

loadStore();
document.getElementById('prev').addEventListener('click', () => { openCards.clear(); offset--; render(); });
document.getElementById('next').addEventListener('click', () => { openCards.clear(); offset++; render(); });
document.getElementById('today-btn').addEventListener('click', () => { openCards.clear(); offset=0; render(); });
document.getElementById('reset-btn').addEventListener('click', resetDay);
document.getElementById('push-all-btn').addEventListener('click', () => {
  const key = dateKey(offset);
  const day = SCHEDULE[dow(offset)];
  if (!day.rest) { getItems(key, day); pushAll(key); }
});
render();
</script>
</body>
</html>
